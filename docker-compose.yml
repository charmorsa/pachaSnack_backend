services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Pacha!2026"
    volumes:
      - sql_data:/var/opt/mssql
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # conexión app
      - "15672:15672"   # panel web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  # redis:
  #   image: redis:7
  #   container_name: redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

  backend:
    profiles:
      - app
    build: .
    container_name: backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Si activás este servicio con Docker, los hosts deben ser los nombres de los servicios.
      DB_HOST: sqlserver
      RABBITMQ_HOST: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - sqlserver
      - rabbitmq
    restart: unless-stopped

volumes:
  sql_data:
